<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist - Jurnal IFBTC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --border-color: #404060;
            --accent: #FF7A00;
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .back-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .back-btn:hover {
            opacity: 0.9;
        }

        .watchlist-container {
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-primary);
            border-bottom: 2px solid var(--border-color);
        }

        th {
            padding: 15px 20px;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tbody tr {
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s ease;
            cursor: pointer;
        }

        tbody tr:hover {
            background-color: rgba(255, 122, 0, 0.05);
        }

        td {
            padding: 15px 20px;
        }

        .stock-code {
            font-weight: 600;
            color: var(--accent);
            font-size: 1.1em;
        }

        .stock-name {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .price {
            font-weight: 600;
            font-size: 1.05em;
        }

        .change {
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .change.positive {
            color: #00E676;
        }

        .change.negative {
            color: #FF4D4D;
        }

        .change-icon {
            font-size: 1.2em;
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .sort-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .sort-btn:hover {
            background: var(--bg-primary);
            border-color: var(--accent);
        }

        .sort-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        footer {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>📋 Watchlist</h1>
                <p class="subtitle">Pantau saham pilihan Anda</p>
            </div>
            <button class="back-btn" onclick="goBack()">← Kembali</button>
        </header>

        <div class="sort-controls">
            <button class="sort-btn active" onclick="sortWatchlist('change', 'desc')">📊 Perubahan (Terbesar ▼)</button>
            <button class="sort-btn" onclick="sortWatchlist('change', 'asc')">📊 Perubahan (Terkecil ▲)</button>
            <button class="sort-btn" onclick="sortWatchlist('price', 'desc')">💰 Harga (Tertinggi)</button>
            <button class="sort-btn" onclick="sortWatchlist('price', 'asc')">💰 Harga (Terendah)</button>
            <button class="sort-btn" onclick="sortWatchlist('code', 'asc')">🔤 Kode Saham (A-Z)</button>
            <button class="sort-btn" onclick="sortWatchlist('name', 'asc')">🔤 Nama (A-Z)</button>
        </div>

        <div class="watchlist-container">
            <table>
                <thead>
                    <tr>
                        <th>Kode Saham</th>
                        <th>Nama Saham</th>
                        <th>Harga Sekarang</th>
                        <th>Perubahan</th>
                    </tr>
                </thead>
                <tbody id="watchlistBody">
                </tbody>
            </table>
        </div>

        <footer>
            <p>Data diperbarui dari TradingView</p>
            <p style="font-size: 0.85em; margin-top: 10px;">Jurnal IFBTC &copy; 2026</p>
        </footer>
    </div>

    <script>
        const stockData = [
            // TH Value In... Portfolio
            { code: 'TLKM', name: 'Telekomunikasi Indonesia', price: 2660, change: 4.89 },
            { code: 'BBCA', name: 'Bank Central Asia', price: 6475, change: 3.86 },
            { code: 'BMRI', name: 'Bank Mandiri', price: 4480, change: 3.79 },
            { code: 'BBRI', name: 'Bank Rakyat Indonesia', price: 2970, change: 3.70 },
            { code: 'AADI', name: 'Astra Oto Parts', price: 8750, change: 2.86 },
            { code: 'BBNI', name: 'Bank Negara Indonesia', price: 3580, change: 2.24 },
            { code: 'APLN', name: 'Airlangga Pribumi', price: 136, change: 0.00 },
            { code: 'INDF', name: 'Indofood Sukses Makmur', price: 6700, change: -0.75 },
            { code: 'ADRO', name: 'Adaro Energy', price: 2490, change: -0.80 },
            { code: 'HRTA', name: 'Hartono Isteel', price: 1910, change: -2.62 },

            // LKH Portfolio
            { code: 'BEST', name: 'Bekasi Fajar Industrial Estate', price: 102, change: -0.98 },
            { code: 'DILD', name: 'Intiland Development', price: 115, change: -1.74 },
            { code: 'BMTR', name: 'Consolidated Plantations', price: 120, change: -1.67 },
            { code: 'SRIL', name: 'Sri Rejeki Isman', price: 146, change: 0.00 },
            { code: 'ADMG', name: 'Adimulya', price: 216, change: 0.00 },
            { code: 'CFIN', name: 'China Finance', price: 334, change: 0.00 },
            { code: 'RALS', name: 'Ratu Prabu', price: 384, change: 1.04 },
            { code: 'SIMP', name: 'Simp Multi Media', price: 550, change: -0.91 },
            { code: 'MAIN', name: 'Mainroad', price: 720, change: 5.56 },
            { code: 'PNIN', name: 'Panin Financial', price: 750, change: 2.00 },
            { code: 'GJTL', name: 'Gajah Tunggal', price: 1145, change: 1.31 },
            { code: 'LSIP', name: 'Lisapro Sejahtera', price: 1320, change: -1.14 },
            { code: 'ABMM', name: 'Asuransi Bina Media', price: 2500, change: 2.00 }
        ];

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        let currentSort = { by: 'change', order: 'desc' };
        let sortedData = [...stockData];

        function openChart(code) {
            window.open(`stock-chart.html?code=${code}`, '_blank');
        }

        function sortWatchlist(sortBy, order) {
            currentSort = { by: sortBy, order: order };
            sortedData = [...stockData];

            sortedData.sort((a, b) => {
                let aVal, bVal;

                switch(sortBy) {
                    case 'change':
                        aVal = a.change;
                        bVal = b.change;
                        break;
                    case 'price':
                        aVal = a.price;
                        bVal = b.price;
                        break;
                    case 'code':
                        aVal = a.code.toLowerCase();
                        bVal = b.code.toLowerCase();
                        break;
                    case 'name':
                        aVal = a.name.toLowerCase();
                        bVal = b.name.toLowerCase();
                        break;
                    default:
                        aVal = a.change;
                        bVal = b.change;
                }

                if (typeof aVal === 'string') {
                    return order === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                } else {
                    return order === 'asc' ? aVal - bVal : bVal - aVal;
                }
            });

            // Update active button
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            renderWatchlist();
        }

        function renderWatchlist() {
            const tbody = document.getElementById('watchlistBody');
            tbody.innerHTML = '';

            sortedData.forEach(stock => {
                const row = document.createElement('tr');
                const changeClass = stock.change >= 0 ? 'positive' : 'negative';
                const changeIcon = stock.change >= 0 ? '▲' : '▼';
                const changeSign = stock.change >= 0 ? '+' : '';

                row.innerHTML = `
                    <td class="stock-code">${stock.code}</td>
                    <td class="stock-name">${stock.name}</td>
                    <td class="price">Rp ${stock.price.toLocaleString('id-ID')}</td>
                    <td class="change ${changeClass}">
                        <span class="change-icon">${changeIcon}</span>
                        <span>${changeSign}${stock.change.toFixed(2)}%</span>
                    </td>
                `;

                row.style.cursor = 'pointer';
                row.onclick = () => openChart(stock.code);
                tbody.appendChild(row);
            });
        }

        function initializeWatchlist() {
            sortedData = [...stockData];
            renderWatchlist();
        }

        document.addEventListener('DOMContentLoaded', initializeWatchlist);
    </script>
</body>
</html>

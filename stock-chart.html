<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Chart</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --text-primary: #f0f0f0;
            --text-secondary: #b0b0b0;
            --border-color: #404060;
            --accent: #FF7A00;
        }

        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .back-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .back-btn:hover {
            opacity: 0.9;
        }

        .chart-container {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }


        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: var(--bg-primary);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .stat-value.positive {
            color: #00E676;
        }

        .stat-value.negative {
            color: #FF4D4D;
        }


        footer {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>📈 <span id="stockCode">BSML</span></h1>
                <p class="subtitle">Stock Price Chart</p>
            </div>
            <button class="back-btn" onclick="goBack()">← Kembali</button>
        </header>

        <div class="chart-container">
            <div id="tradingview_chart" style="height: 500px; width: 100%;"></div>
            <div class="stats" id="statsContainer"></div>
        </div>

        <footer>
            <p>Data diperbarui dari Yahoo Finance API</p>
            <p style="font-size: 0.85em; margin-top: 10px;">Jurnal IFBTC &copy; 2026</p>
        </footer>
    </div>

    <script>
        let currentStock = 'BSML';

        // Get stock code from URL parameter
        const params = new URLSearchParams(window.location.search);
        if (params.get('code')) {
            currentStock = params.get('code').toUpperCase();
            document.getElementById('stockCode').textContent = currentStock;
        }

        function goBack() {
            window.location.href = 'dashboard.html';
        }

        function initializeTradingViewChart() {
            // Map stock codes to TradingView symbols
            const symbolMap = {
                // Indonesian stocks (IDX)
                'BBCA': 'IDX:BBCA',
                'BBHI': 'IDX:BBHI',
                'BBNI': 'IDX:BBNI',
                'BBRI': 'IDX:BBRI',
                'BNBA': 'IDX:BNBA',
                'TLKM': 'IDX:TLKM',
                'BMRI': 'IDX:BMRI',
                'AADI': 'IDX:AADI',
                'APLN': 'IDX:APLN',
                'INDF': 'IDX:INDF',
                'ADRO': 'IDX:ADRO',
                'HRTA': 'IDX:HRTA',
                'BEST': 'IDX:BEST',
                'DILD': 'IDX:DILD',
                'BMTR': 'IDX:BMTR',
                'SRIL': 'IDX:SRIL',
                'ADMG': 'IDX:ADMG',
                'CFIN': 'IDX:CFIN',
                'RALS': 'IDX:RALS',
                'SIMP': 'IDX:SIMP',
                'MAIN': 'IDX:MAIN',
                'PNIN': 'IDX:PNIN',
                'GJTL': 'IDX:GJTL',
                'LSIP': 'IDX:LSIP',
                'ABMM': 'IDX:ABMM',
                // US Stocks
                'PANW': 'NASDAQ:PANW',
                'CRWD': 'NASDAQ:CRWD',
                'FTNT': 'NASDAQ:FTNT',
                'OKTA': 'NASDAQ:OKTA',
                'ZS': 'NASDAQ:ZS',
                'NVDA': 'NASDAQ:NVDA',
                'KO': 'NYSE:KO',
                'CB': 'NYSE:CB',
                'USD': 'FX_IDC:USDIDR',
                'LRCX': 'NASDAQ:LRCX',
                'STX': 'NASDAQ:STX',
                'WDC': 'NASDAQ:WDC',
                'CAT': 'NYSE:CAT',
                'MU': 'NASDAQ:MU',
                'AMD': 'NASDAQ:AMD',
                'ANET': 'NYSE:ANET',
                // Crypto
                'BTC': 'BINANCE:BTCUSDT',
                'XAU': 'NYMEX:GC1!',
                'ORCLON': 'IDX:ORCLON',
                'ARMON': 'IDX:ARMON'
            };

            // Determine the symbol with proper exchange prefix
            let symbol = symbolMap[currentStock];

            if (!symbol) {
                // If not in map, determine exchange based on code characteristics
                if (currentStock.includes('.')) {
                    // Has exchange suffix like .JK
                    symbol = `IDX:${currentStock.split('.')[0]}`;
                } else if (currentStock.length <= 3) {
                    // Short codes like USD, XAU are likely commodities/forex
                    symbol = currentStock;
                } else if (currentStock.length <= 5 && currentStock.match(/^[A-Z]+$/)) {
                    // 4-5 char codes without . are likely US stocks
                    symbol = `NASDAQ:${currentStock}`;
                } else {
                    // Default to IDX for unknown Indonesian stocks
                    symbol = `IDX:${currentStock}`;
                }
            }

            // Clear the container
            const container = document.getElementById('tradingview_chart');
            if (container) {
                container.innerHTML = '';
            }

            // Wait for TradingView to be available
            if (typeof TradingView !== 'undefined') {
                try {
                    // Create TradingView chart widget
                    new TradingView.widget({
                        "autosize": true,
                        "symbol": symbol,
                        "interval": "D",
                        "timezone": "Asia/Jakarta",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "toolbar_bg": "#f1f3f6",
                        "enable_publishing": false,
                        "allow_symbol_change": false,
                        "container_id": "tradingview_chart"
                    });
                } catch (error) {
                    console.error('Error loading TradingView widget:', error);
                    container.innerHTML = '<p style="color: #ff6b6b; padding: 20px;">Error loading chart. Please refresh the page.</p>';
                }
            } else {
                // Retry if TradingView not loaded yet
                setTimeout(initializeTradingViewChart, 500);
            }
        }

        // Initialize when TradingView library loads
        window.addEventListener('load', initializeTradingViewChart);

        // Also try on DOMContentLoaded
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(initializeTradingViewChart, 1000);
        });
    </script>
</body>
</html>
